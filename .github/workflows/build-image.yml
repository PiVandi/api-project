name: build-image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name demoregistrypitt

      - name: Build Docker image
        run: docker build -t demoregistrypitt.azurecr.io/api:latest .

      - name: Push Docker image
        run: docker push demoregistrypitt.azurecr.io/api:latest